# Docker-specific Spring properties
# This file is ONLY loaded when the container starts with -Dspring.profiles.active=docker
# It OVERRIDES the localhost values in application.properties — never touches them.

spring.application.name=Individual
server.port=8087

# ─── Database ───────────────────────────────────────────────────────────────
# "individual-db" is the Docker Compose service name — Docker resolves it
# automatically over the internal bridge network. No need for an IP address.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://individual-db:5432/individual}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:individual}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:individual_dev_pw}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── JWT ────────────────────────────────────────────────────────────────────
# Override this with a real secret via environment variable in production:
#   JWT_SECRET=<your-secret>
jwt.secret=${JWT_SECRET:CHANGE_ME_generate_a_real_256bit_secret_before_deploying}
jwt.expiration=${JWT_EXPIRATION:28800000}

# ─── Resend Email (optional) ─────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ─── Twilio — SMS + WhatsApp (optional) ──────────────────────────────────────
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}

# ─── Telegram Bot (optional) ─────────────────────────────────────────────────
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}

# ─── Google Calendar OAuth (optional) ────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:8087/api/v1/calendar/callback}

# ─── App Base URL (tracking/booking links) ───────────────────────────────────
app.base.url=${APP_BASE_URL:http://localhost:3001}

# ─── OpenAI-compatible chat API (optional) ───────────────────────────────────
# Not Spring AI's auto-configured client — see spring.autoconfigure.exclude below,
# required regardless of whether these are set.
chat.base-url=${AI_BASE_URL:https://integrate.api.nvidia.com}
chat.api-key=${AI_API_KEY:}
chat.model=${AI_MODEL:mistralai/mistral-medium-3.5-128b}
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# ─── Actuator — explicit, locked-down exposure ───────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Superadmin (seeded once at startup — see StartupInitializer) ────────────
superadmin.email=${SUPERADMIN_EMAIL:}
superadmin.password=${SUPERADMIN_PASSWORD:}
superadmin.ip-allowlist=${SUPERADMIN_IP_ALLOWLIST:}

# ─── Platform GPay/UPI details shown on the tenant subscription page ─────────
app.payment.upi-id=${PLATFORM_UPI_ID:}
app.payment.upi-qr-base64=${PLATFORM_UPI_QR_BASE64:}
