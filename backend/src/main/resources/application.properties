spring.application.name=Individual
server.port=8087

# Database — local Postgres, see ../../../../docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5433/individual
spring.datasource.username=individual
spring.datasource.password=individual_dev_pw
spring.jpa.hibernate.ddl-auto=update

# JWT — generate a real secret before any real deployment, e.g. `openssl rand -base64 64`
jwt.secret=${JWT_SECRET:CHANGE_ME_generate_a_real_256bit_secret_before_deploying}
jwt.expiration=${JWT_EXPIRATION:28800000}

# Resend Email (optional — leave blank to run without it)
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Twilio — SMS + WhatsApp (optional)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}

# Telegram Bot (optional)
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}

# Google Calendar OAuth (optional)
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:8087/api/v1/calendar/callback}

# App URL (for building tracking/booking links)
app.base.url=${APP_BASE_URL:http://localhost:3001}

# OpenAI-compatible chat API (optional — chatbot degrades gracefully without it).
# Not Spring AI's auto-configured client (see spring.autoconfigure.exclude below,
# which is required regardless of whether these are set — Spring AI's
# OpenAiAutoConfiguration fails app startup on a blank key even when unused).
chat.base-url=${AI_BASE_URL:https://integrate.api.nvidia.com}
chat.api-key=${AI_API_KEY:}
chat.model=${AI_MODEL:mistralai/mistral-medium-3.5-128b}
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

server.tomcat.max-http-form-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
